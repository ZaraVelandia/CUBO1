<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartografía · Portafolio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f1a;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  color: #fff;
}

/* ── Barra superior ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
}
.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.back-btn:hover { color: #fff; }
.back-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }
.site-title {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}
.page-nav {
  display: flex;
  gap: 6px;
}
.page-nav a {
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  letter-spacing: 1px;
  transition: background 0.15s, color 0.15s;
}
.page-nav a:hover { background: rgba(255,255,255,0.08); color: #fff; }
.page-nav a.active { color: #fff; background: rgba(255,255,255,0.1); }

/* ── Contenido ── */
.content-area {
  max-width: 760px;
  margin: 0 auto;
  padding: 60px 32px 80px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ── Tarjeta ── */
.project-card {
  display: flex;
  gap: 32px;
  align-items: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 32px;
  text-decoration: none;
  color: #fff;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  cursor: pointer;
}
.project-card:hover {
  border-color: rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.07);
  transform: translateY(-3px);
}

/* Imagen izquierda */
.project-img {
  width: 200px;
  height: 160px;
  flex-shrink: 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
}
.project-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.project-img .img-placeholder {
  font-size: 48px;
  opacity: 0.3;
}

/* Texto derecha */
.project-info {
  flex: 1;
}
.project-title {
  font-size: 26px;
  font-weight: bold;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.project-url {
  font-size: 12px;
  font-family: monospace;
  color: rgba(255,255,255,0.35);
  letter-spacing: 1px;
}
.project-arrow {
  font-size: 22px;
  color: rgba(255,255,255,0.25);
  margin-top: 16px;
  transition: color 0.2s, transform 0.2s;
}
.project-card:hover .project-arrow {
  color: rgba(255,255,255,0.7);
  transform: translateX(4px);
}

/* ── Responsive ── */
@media (max-width: 600px) {
  .topbar { padding: 14px 16px; }
  .page-nav { display: none; }
  .content-area { padding: 32px 16px 60px; }
  .project-card { flex-direction: column; }
  .project-img { width: 100%; height: 200px; }
}
</style>
</head>
<body>
